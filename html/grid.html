<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid</title>

    <!-- tailwind css -->
     <link rel="stylesheet" href="../src/output.css">

</head>
<body>
    <!-- Grid container -->
     <div class="grid grid-flow-row-dense grid-cols-5 gap-5 p-5">
        <!-- grid item -->
         <div class="bg-amber-100 col-start-3 row-span-2">item1</div>
         <div class="bg-blue-300 col-span-2">item2</div>
         <div class="bg-pink-400">item3</div>
         <div class="bg-red-300">item4</div>
         <div class="bg-sky-950">item5</div>
         <div class="bg-emerald-500">item6</div>
         <div class="bg-gray-600">item7</div>
         <div class="bg-amber-950">item8</div>
         <div class="bg-indigo-600 col-span-3">item9</div>
         <div class="bg-fuchsia-900">item10</div>
     </div>
    
</body>
</html>
